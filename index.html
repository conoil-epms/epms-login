<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d2318">
  <title>Conoil EPMS — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d2318;
      color: #fff;
    }
    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo-mark {
      width: 80px; height: 80px;
      margin: 0 auto 20px;
      background: white;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .logo-mark img { width: 100%; height: 100%; object-fit: contain; }
    .brand { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: #52B788; text-transform: uppercase; margin-bottom: 8px; }
    .title { font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
    .info-box {
      background: rgba(82,183,136,0.08);
      border: 1px solid rgba(82,183,136,0.2);
      border-radius: 12px;
      padding: 16px 18px;
      text-align: left;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
    }
    #gsiButtonContainer {
      display: flex; justify-content: center;
      margin-bottom: 16px;
      min-height: 44px;
    }
    #statusMsg {
      display: none;
      font-size: 13px;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 8px;
    }
    #statusMsg.info { display: block; background: rgba(82,183,136,0.1); color: #52B788; }
    #statusMsg.error { display: block; background: rgba(231,76,60,0.1); color: #e74c3c; }
    .footer-note { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 20px; }
    #appFrame {
      display: none;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #52B788;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="wrapper" id="loginWrapper">
    <div class="card">
      <div class="logo-mark">
        <img src="conoil-logo.png" alt="Conoil Logo" onerror="this.style.display='none'">
      </div>
      <div class="brand">Conoil Group</div>
      <div class="title">Enterprise Project<br>Monitoring System</div>
      <div class="subtitle">EPMS v3.0 · Secure Access Portal</div>

      <div class="info-box">
        Sign in with your registered Google account.<br>
        Your email must be registered by the Administrator.<br>
        Access is granted based on your assigned role.
      </div>

      <div id="gsiButtonContainer"></div>
      <div id="statusMsg"></div>

      <div class="footer-note">Conoil Group · Authorised personnel only</div>
    </div>
  </div>

  <iframe id="appFrame" name="appFrame" title="EPMS" style="display:none;"></iframe>

  <!-- Hidden form for native POST submission. Browsers do NOT subject
       traditional form submissions to the same CORS/auth-layer
       restrictions that block fetch() to Apps Script from a foreign
       origin — this is the Google-documented workaround. -->
  <form id="signinForm" method="POST" action="" target="appFrame" style="display:none;">
    <input type="hidden" name="action" value="requestAuthTokenForm">
    <input type="hidden" name="idToken" id="idTokenField" value="">
  </form>

  <script>
    // ─────────────────────────────────────────────
    //  CONFIG
    // ─────────────────────────────────────────────
    var GOOGLE_CLIENT_ID = '1013808795062-k5sg7irlbv4qd32da830sjjut56lun42.apps.googleusercontent.com';
    var APPS_SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyVWxu8v_prSuxzV8qWNtXZdG2FQirKwx6K9oShdInFvjdJ1EiHJdXT9tYNW9Gly1HZfQ/exec';

    function showStatus(msg, type) {
      var el = document.getElementById('statusMsg');
      el.className = type;
      el.innerHTML = msg;
    }

    function handleGoogleCredential(response) {
      showStatus('<span class="spinner"></span>Verifying your account…', 'info');

      // GET request instead of POST — Apps Script's internal redirect
      // from script.google.com to its execution domain is known to lose
      // POST request bodies in many client/redirect-type combinations.
      // GET has no body to lose, so this is the reliable path.
      var url = APPS_SCRIPT_URL
        + '?action=requestAuthToken'
        + '&idToken=' + encodeURIComponent(response.credential);

      fetch(url, { method: 'GET' })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data && data.success && data.data && data.data.redirectUrl) {
            showStatus('<span class="spinner"></span>Opening EPMS…', 'info');
            window.location.href = data.data.redirectUrl;
          } else {
            showStatus((data && data.message) || 'Sign-in failed. Please try again.', 'error');
          }
        })
        .catch(function (err) {
          showStatus('Connection error: ' + err.message, 'error');
        });
    }

    window.addEventListener('message', function (event) {
      if (event.data && event.data.type === 'epms-signin-error') {
        showStatus(event.data.message, 'error');
      }
    });

    window.addEventListener('load', function () {
      if (typeof google === 'undefined' || !google.accounts) {
        showStatus('Could not load Google Sign-In. Check your connection and reload.', 'error');
        return;
      }

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
      });

      google.accounts.id.renderButton(
        document.getElementById('gsiButtonContainer'),
        { theme: 'filled_black', size: 'large', shape: 'pill', width: 320, text: 'signin_with' }
      );
    });
  </script>

</body>
</html>
